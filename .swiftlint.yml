disabled_rules:
  - type_name
  - identifier_name
  - switch_case_alignment
  - private_over_fileprivate
  - cyclomatic_complexity # Too many false alarms for enum conversion switch statements
  - implicit_optional_initialization
  - closure_parameter_position
  - opening_brace
  - nesting # Sometimes it just makes sense to nest 2 levels deep
  - trailing_comma # Conflicts with swift-format
  - file_length
  - force_cast # Required a lot in vein
  - function_body_length
  - function_parameter_count
  - blanket_disable_command
  - multiple_closures_with_trailing_closure # Annoying for e.g. _withObservationNotification

line_length: 140
type_body_length: 400

included:
  - Sources
  - Examples
excluded:
  - Examples/CliExample/.build
  - Sources/ULID
  - Tests/ULIDTests
  - Sources/VeinCore/VeinCore.docc
  - Sources/VeinSwiftUI/VeinSwiftUI.docc
  - .build
  - Examples/SCUIBasicExample/.build
  - Examples/CliExample/.build