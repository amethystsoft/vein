name: Swift Test (Ubuntu 24.04)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: blacksmith-8vcpu-ubuntu-2404-arm
    container:
      image: swift:6.2.3-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test
        run: SHOULD_DISABLE_ENCRYPTION=1 swift test --test-product amethyst-veinPackageTests
