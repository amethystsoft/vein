name: Swift Test (Ubuntu 24.04)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: swift:6.3.2-noble
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y dbus-x11 gnome-keyring
      - name: Test VeinCore
        run: |
          dbus-run-session -- sh -c '
            echo "test" | gnome-keyring-daemon --unlock --components=secrets
            ./Scripts/tsan-test.sh
          '
      - name: Test VeinSCUI
        run: |
          dbus-run-session -- sh -c '
            echo "test" | gnome-keyring-daemon --unlock --components=secrets
            TEST_SCUI=1 ./Scripts/tsan-test.sh
          '
  build-example:
    needs: linux
    runs-on: blacksmith-2vcpu-ubuntu-2404
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-
      - name: Build FacetCLI
        run: ./Scripts/build-cli-examples.sh