name: Swift Test (Ubuntu 24.04 & Android)

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: blacksmith-8vcpu-ubuntu-2404-arm
    container:
      image: swift:6.2.3-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test on Linux
        run: SHOULD_DISABLE_ENCRYPTION=1 swift test -Xcc -I/usr/include -Xlinker -L/usr/lib
      - name: "Test Swift Package on Android"
        uses: skiptools/swift-android-action@v2
        with:
          # Ubuntu runners low on space causes the emulator to fail to install
          free-disk-space: true
