name: Swift Test (Android)
on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]
jobs:
  linux-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Test Swift Package on Android"
        uses: skiptools/swift-android-action@v2
        with:
          # Ubuntu runners low on space causes the emulator to fail to install
          free-disk-space: true
          swift-test-flags: '--test-product amethyst-veinPackageTests'
          swift-build-flags: '--product amethyst-veinPackageTests'