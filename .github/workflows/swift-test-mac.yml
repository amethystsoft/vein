name: Swift Test (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
      - name: Test VeinCore
        run: ./Scripts/tsan-test.sh
      - name: Test VeinSwiftUI
        run: TEST_SWIFTUI=1 ./Scripts/tsan-test.sh
